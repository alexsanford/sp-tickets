<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinderella — Ticket Availability Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--card:#fff;--border:#e0e0e0;--text:#1a1a2e;--text-muted:#6c757d;
  --accent:#4361ee;--accent-light:#e8ecfd;--green:#2d936c;--yellow:#e8a838;--red:#d62828;
  --sold-out:#9ca3af;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent)}

.container{max-width:960px;margin:0 auto;padding:16px}

header{text-align:center;padding:32px 0 16px}
header h1{font-size:1.6rem;font-weight:700;color:var(--text)}
header p{color:var(--text-muted);font-size:.9rem;margin-top:4px}

.stats-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;padding:16px 0}
.stat{text-align:center}
.stat .value{font-size:1.5rem;font-weight:700}
.stat .label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}

.chart-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:20px 0;box-shadow:var(--shadow)}
.chart-section h2{font-size:1rem;font-weight:600;margin-bottom:12px}
.chart-controls{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
.chart-controls .range-btns{display:flex;gap:4px}
.chart-controls .range-btns button{padding:4px 12px;font-size:.72rem;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-family:inherit;transition:all .15s}
.chart-controls .range-btns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chart-wrapper{position:relative;width:100%;height:320px}
.chart-toggle{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chart-toggle button{padding:4px 10px;font-size:.7rem;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-family:inherit;transition:all .15s}
.chart-toggle button.hidden-line{opacity:.4;text-decoration:line-through}

.timeline{margin-top:20px}
.timeline h2{font-size:1rem;font-weight:600;margin-bottom:12px}

.snapshot{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden}
.snapshot-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.snapshot-header:hover{background:#f1f3f5}
.snapshot-header .chevron{font-size:.7rem;color:var(--text-muted);transition:transform .2s;flex-shrink:0;width:16px;text-align:center}
.snapshot.open .chevron{transform:rotate(90deg)}
.snapshot-header .date{font-weight:600;font-size:.9rem;white-space:nowrap}
.snapshot-header .count{font-size:.9rem;color:var(--text-muted)}
.snapshot-header .count strong{color:var(--text)}
.progress-bar-wrap{flex:1;min-width:80px;height:8px;background:#e9ecef;border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .4s}

.snapshot-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.snapshot.open .snapshot-body{max-height:2000px}

.shows-table{width:100%;border-collapse:collapse;font-size:.82rem}
.shows-table th{text-align:left;padding:8px 12px;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:2px solid var(--border);background:#fafbfc}
.shows-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.shows-table tr.sold-out td{background:#f9f9f9;color:var(--sold-out)}
.shows-table tr.sold-out .show-name{text-decoration:line-through}
.badge-sold-out{display:inline-block;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.badge-available{display:inline-block;background:var(--green);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}

.sections-grid{display:flex;flex-wrap:wrap;gap:4px 12px}
.section-chip{font-size:.72rem;white-space:nowrap;display:inline-flex;align-items:center;gap:2px}
.section-chip .sec-name{color:var(--text-muted)}
.section-chip .sec-count{font-weight:600}

.mini-bar{display:inline-block;width:40px;height:6px;background:#e9ecef;border-radius:3px;overflow:hidden;vertical-align:middle;margin-left:4px}
.mini-bar-fill{display:block;height:100%;border-radius:3px}

footer{text-align:center;padding:24px 0;font-size:.75rem;color:var(--text-muted)}

@media(max-width:600px){
  .container{padding:10px}
  header h1{font-size:1.2rem}
  .snapshot-header{flex-wrap:wrap;gap:6px}
  .progress-bar-wrap{order:10;width:100%;flex:unset}
  .chart-wrapper{height:240px}
  .chart-controls{flex-direction:column;align-items:flex-start}
  .snapshot-body{padding:0 4px}
  .shows-table,.shows-table thead,.shows-table tbody,.shows-table th,.shows-table td,.shows-table tr{display:block}
  .shows-table thead{display:none}
  .shows-table tr{padding:10px 8px;border-bottom:1px solid var(--border)}
  .shows-table tr:last-child{border-bottom:none}
  .shows-table td{padding:4px 8px;border-bottom:none;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .shows-table td::before{content:attr(data-label);font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
  .shows-table td:last-child{flex-direction:column;align-items:stretch;justify-content:flex-start;gap:4px;padding:4px 8px}
  .shows-table td:last-child::before{display:none}
  .sections-grid{flex-direction:column;gap:4px}
  .section-chip{flex-wrap:wrap;width:100%}
  .mini-bar{width:60px}
}

.loading{text-align:center;padding:60px 0;color:var(--text-muted)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.view-latest-btn{display:flex;justify-content:center;margin:16px 0}
.view-latest-btn a{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:.9rem;font-weight:600;text-decoration:none;transition:background .15s,transform .15s;box-shadow:0 2px 8px rgba(67,97,238,.25)}
.view-latest-btn a:hover{background:#3651d4;transform:translateY(-1px)}
.view-latest-btn a:active{transform:translateY(0)}
.view-latest-btn a svg{width:16px;height:16px;fill:currentColor}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Rodgers &amp; Hammerstein's Cinderella</h1>
    <p>Ticket Availability Tracker &mdash; Stage Prophets at Acadia Festival Theatre</p>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <div class="view-latest-btn"><a href="#" id="viewLatestBtn">View Latest Breakdown <svg viewBox="0 0 16 16"><path d="M1.5 5.5l6.5 6.5 6.5-6.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a></div>

  <div class="chart-section">
    <h2>Availability Over Time</h2>
    <div class="chart-controls">
      <div class="range-btns" id="rangeToggle">
        <button class="active" data-range="month">Last Month</button>
        <button data-range="all">Full History</button>
      </div>
    </div>
    <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
    <div class="chart-toggle" id="chartToggle"></div>
  </div>

  <div class="timeline">
    <h2>Scrape History</h2>
    <div id="timelineLoading" class="loading"><div class="spinner"></div><br>Loading data...</div>
    <div id="timeline"></div>
  </div>

  <footer>Last updated when <code>build_data.py</code> is run. Data is static.</footer>
</div>

<script>
const SHOW_ORDER = [
  "Fri May 8 7PM","Sat May 9 2PM","Sat May 9 7PM","Sun May 10 2PM",
  "Fri May 15 7PM","Sat May 16 2PM","Sat May 16 7PM","Sun May 17 2PM"
];

const SECTION_LABELS = {
  "SEC-1":"Stage Left (SEC-1)","SEC-2":"Center-Left (SEC-2)",
  "SEC-3":"Center (SEC-3)","SEC-4":"Center (SEC-4)",
  "SEC-5":"Center-Right (SEC-5)","SEC-6":"Stage Right (SEC-6)"
};

const SECTION_ORDER = ["SEC-1","SEC-2","SEC-3","SEC-4","SEC-5","SEC-6"];

const SHOW_COLORS = [
  "#4361ee","#7209b7","#f72585","#4cc9f0",
  "#2d936c","#e8a838","#d62828","#9b59b6"
];

const TOTAL_SEATS = 4032;
const SEATS_PER_SHOW = 504;

function parseTimestamp(ts) {
  const [date, time] = ts.split("_");
  const [y, m, d] = date.split("-").map(Number);
  const [h, min] = time.split("-").map(Number);
  return new Date(y, m - 1, d, h, min);
}

function formatDate(ts) {
  const dt = parseTimestamp(ts);
  return dt.toLocaleDateString("en-CA", {
    weekday:"short", month:"short", day:"numeric", year:"numeric"
  }) + " &mdash; " + dt.toLocaleTimeString("en-CA", {
    hour:"numeric", minute:"2-digit", hour12:true
  });
}

function shortDate(ts) {
  const dt = parseTimestamp(ts);
  return dt.toLocaleDateString("en-CA", { month:"short", day:"numeric" });
}

function pctColor(pct) {
  if (pct > 0.5) return "var(--green)";
  if (pct > 0.2) return "var(--yellow)";
  return "var(--red)";
}

function miniBarColor(available, total) {
  const pct = available / total;
  if (pct > 0.5) return "var(--green)";
  if (pct > 0.2) return "var(--yellow)";
  if (available === 0) return "var(--sold-out)";
  return "var(--red)";
}

function comma(n) { return n.toLocaleString("en-CA"); }

function renderStats(data) {
  const latest = data[data.length - 1];
  const first = data[0];
  const firstDate = formatDate(first.scraped_at);
  const lastDate = formatDate(latest.scraped_at);
  const snapCount = data.length;

  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="value" style="color:${pctColor(latest.total_available/TOTAL_SEATS)}">${comma(latest.total_available)}</div><div class="label">Tickets Remaining</div></div>
    <div class="stat"><div class="value">${snapCount}</div><div class="label">Snapshots</div></div>
    <div class="stat"><div class="value">${firstDate.split(" —")[0]}</div><div class="label">First Scrape</div></div>
    <div class="stat"><div class="value">${lastDate.split(" —")[0]}</div><div class="label">Latest Scrape</div></div>
  `;
}

function renderChart(data) {
  const ctx = document.getElementById("trendChart").getContext("2d");

  const allTimestamps = data.map(d => parseTimestamp(d.scraped_at));
  const minTsAll = allTimestamps[0].getTime();
  const maxTsAll = allTimestamps[allTimestamps.length - 1].getTime();

  window.chartData = data;
  window.allMinTs = minTsAll;
  window.allMaxTs = maxTsAll;

  const oneMonthMs = 30 * 86400000;
  const lastMonthTs = maxTsAll - oneMonthMs;

  window.lastMonthMin = Math.max(minTsAll, lastMonthTs);

  function buildFilteredData(rangeMin) {
    const filtered = data.filter(d => parseTimestamp(d.scraped_at).getTime() >= rangeMin);

    const datasets = SHOW_ORDER.map((show, i) => ({
      label: show,
      data: filtered.reduce((pts, d) => {
        const showData = d.shows[show];
        if (showData) pts.push({ x: parseTimestamp(d.scraped_at).getTime(), y: showData.available });
        return pts;
      }, []),
      borderColor: SHOW_COLORS[i],
      backgroundColor: SHOW_COLORS[i] + "20",
      borderWidth: 2,
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
      fill: false
    }));

    datasets.push({
      label: "Total (all shows)",
      data: filtered.map(d => ({
        x: parseTimestamp(d.scraped_at).getTime(),
        y: d.total_available
      })),
      borderColor: "#1a1a2e",
      backgroundColor: "#1a1a2e20",
      borderWidth: 3,
      borderDash: [6, 3],
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: 0.3,
      spanGaps: true,
      fill: false
    });

    return datasets;
  }

  function tickCallback(value) {
    const dt = new Date(value);
    return dt.toLocaleDateString("en-CA", { month:"short", day:"numeric" });
  }

  window.trendChart = new Chart(ctx, {
    type: "line",
    data: { datasets: buildFilteredData(window.lastMonthMin) },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      interaction: { mode: "nearest", intersect: false, axis: "x" },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => {
              if (!items.length) return "";
              const ts = new Date(items[0].parsed.x);
              return ts.toLocaleDateString("en-CA", {
                weekday:"short", month:"long", day:"numeric", year:"numeric"
              }) + " — " + ts.toLocaleTimeString("en-CA", {
                hour:"numeric", minute:"2-digit", hour12:true
              });
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          title: { display: true, text: "Available Seats", font: { size: 11 } }
        },
        x: {
          type: "linear",
          min: window.lastMonthMin - 86400000,
          max: maxTsAll + 86400000,
          ticks: {
            callback: tickCallback,
            maxTicksLimit: 10,
            font: { size: 11 }
          },
          title: { display: true, text: "Date", font: { size: 11 } }
        }
      }
    }
  });

  const totalIdx = SHOW_ORDER.length;
  window.trendChart.getDatasetMeta(totalIdx).hidden = true;
  window.trendChart.update();

  const toggle = document.getElementById("chartToggle");
  toggle.innerHTML = "";

  const allLabels = [...SHOW_ORDER, "Total (all shows)"];
  const allColors = [...SHOW_COLORS, "#1a1a2e"];

  allLabels.forEach((label, i) => {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.style.borderColor = allColors[i];
    btn.style.color = allColors[i];
    if (i === totalIdx) {
      btn.style.borderStyle = "dashed";
      btn.style.fontWeight = "700";
      btn.classList.add("hidden-line");
    }
    btn.addEventListener("click", () => {
      const meta = window.trendChart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      btn.classList.toggle("hidden-line", meta.hidden);
      window.trendChart.update();
    });
    toggle.appendChild(btn);
  });

  const rangeButtons = document.querySelectorAll("#rangeToggle button");
  rangeButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      rangeButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const range = btn.dataset.range;
      const rangeMin = range === "all" ? minTsAll - 86400000 : window.lastMonthMin - 86400000;
      const newDatasets = buildFilteredData(range === "all" ? 0 : window.lastMonthMin);
      window.trendChart.data.datasets = newDatasets;
      window.trendChart.getDatasetMeta(totalIdx).hidden = true;
      const toggleBtns = document.querySelectorAll("#chartToggle button");
      toggleBtns[totalIdx].classList.add("hidden-line");
      window.trendChart.options.scales.x.min = rangeMin;
      window.trendChart.update();
    });
  });
}

function renderTimeline(data) {
  const container = document.getElementById("timeline");
  const reversed = [...data].reverse();

  container.innerHTML = reversed.map((snap, idx) => {
    const pct = snap.total_available / TOTAL_SEATS;
    const color = pctColor(pct);
    const showsHtml = SHOW_ORDER
      .filter(name => snap.shows[name])
      .map(name => {
        const show = snap.shows[name];
        const soldOut = show.available === 0;
        const rowClass = soldOut ? "sold-out" : "";
        const statusBadge = soldOut
          ? '<span class="badge-sold-out">Sold Out</span>'
          : '<span class="badge-available">Available</span>';

        const sectionsHtml = SECTION_ORDER
          .filter(sec => show.sections[sec])
          .map(sec => {
            const s = show.sections[sec];
            const barColor = miniBarColor(s.available, s.total);
            const barPct = Math.round((s.available / s.total) * 100);
            return `<span class="section-chip"><span class="sec-name">${SECTION_LABELS[sec]}:</span> <span class="sec-count">${s.available}/${s.total}</span><span class="mini-bar"><span class="mini-bar-fill" style="width:${barPct}%;background:${barColor}"></span></span></span>`;
          }).join(" ");

        return `<tr class="${rowClass}">
          <td data-label="Show" class="show-name">${name}</td>
          <td data-label="Available">${show.available} / ${show.total}</td>
          <td data-label="Status">${statusBadge}</td>
          <td data-label="Sections"><div class="sections-grid">${sectionsHtml}</div></td>
        </tr>`;
      }).join("");

    return `
      <div class="snapshot" id="${idx === 0 ? 'latest-snapshot' : 'snap-' + (data.length - 1 - idx)}" onclick="toggleSnap(this)">
        <div class="snapshot-header">
          <span class="chevron">&#9654;</span>
          <span class="date">${formatDate(snap.scraped_at)}</span>
          <span class="count"><strong>${comma(snap.total_available)}</strong> / ${comma(TOTAL_SEATS)} remaining</span>
          <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round(pct*100)}%;background:${color}"></div></div>
        </div>
        <div class="snapshot-body">
          <table class="shows-table">
            <thead><tr><th>Show</th><th>Available / Total</th><th>Status</th><th>Sections</th></tr></thead>
            <tbody>${showsHtml}</tbody>
          </table>
        </div>
      </div>`;
  }).join("");
}

function toggleSnap(el) {
  el.classList.toggle("open");
}

document.getElementById("viewLatestBtn").addEventListener("click", (e) => {
  e.preventDefault();
  const el = document.getElementById("latest-snapshot");
  if (!el) return;
  el.classList.add("open");
  setTimeout(() => {
    el.scrollIntoView({ behavior: "smooth", block: "start" });
  }, 100);
});

fetch("all_data.json")
  .then(r => r.json())
  .then(data => {
    const loading = document.getElementById("timelineLoading");
    if (loading) loading.remove();
    renderStats(data);
    renderChart(data);
    renderTimeline(data);
  })
  .catch(err => {
    const loading = document.getElementById("timelineLoading");
    if (loading) loading.remove();
    document.getElementById("timeline").innerHTML = `<p style="color:var(--red)">Failed to load data: ${err.message}</p>`;
  });
</script>
</body>
</html>
